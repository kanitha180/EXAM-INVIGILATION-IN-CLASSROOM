<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Exam Invigilation Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<h1 class="dashboard-title">
🤖 AI EXAM INVIGILATION DASHBOARD
</h1>

<div class="dashboard">

    <!-- ================= CAMERA ================= -->

    <div class="camera-panel">

        <img
            src="{{ url_for('video') }}"
            class="camera-feed"
            id="cameraFeed"
        >

    </div>

    <!-- ================= RIGHT PANEL ================= -->

    <div class="status-panel">

        <div class="status-card">
            <h3>👤 Persons</h3>
            <p id="persons">0</p>
        </div>

        <div class="status-card">
            <h3>📊 Risk</h3>
            <p id="risk">LOW</p>
        </div>

        <div class="status-card">
            <h3>👀 Head Pose</h3>
            <p id="head">Looking Forward</p>
        </div>

        <div class="status-card">
            <h3>📱 Phone</h3>
            <p id="phone">Not Detected</p>
        </div>

        <div class="status-card">
            <h3>🚨 Alerts</h3>
            <p id="alerts">0</p>
        </div>

        <div class="status-card">
            <h3>🟢 System Status</h3>
            <p style="color:lime;">
                LIVE
            </p>
        </div>

        <div class="status-card">

            <button
                onclick="downloadReport()"
                class="download-btn">

                📄 Download Report

            </button>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

<script>

function downloadReport(){

    window.location.href="/report";

}

</script>

</body>

</html>
